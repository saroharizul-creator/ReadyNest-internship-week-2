version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: insightflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: insightflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - insightflow-network
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: insightflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - insightflow-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@postgres:5432/insightflow
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecretjwtkey123
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - insightflow-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insightflow-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - insightflow-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  insightflow-network:
    driver: bridge
